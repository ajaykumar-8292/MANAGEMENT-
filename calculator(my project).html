<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Boolean</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: beige;
        }
        #calcuator{
            ;
             border: 1px solid black;
    border-radius: 5px;
    width: 260px;
    justify-items: center;
    margin: auto;
   margin-top: 200px;
        }
        #display{
            margin: 10px;
            width: 85%;
            font-size: 25px;
            background: transparent;
            font-size: 40px;
        }
        .button-conatiner{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .button{
    width: 45px;
    height: 40px;
    margin: 10px;
    font-size: 20px;

}

    </style>
</head>
<body>
    <div id="calcuator">
        <input type="text" id="display"  placeholder="0" readonly>
    <div class="button-conatiner">
       <button class="button" onclick="calcuator = ''; document.querySelector('#display').value = calcuator;">AC</button>
       <button class="button" onclick="calcuator = ''; document.querySelector('#display').value = calcuator;">DLE</button>
       <button class="button" onclick="calcuator = calcuator + '%'; document.querySelector('#display').value = calcuator;">%</button>
       <button  class="button" onclick="calcuator = calcuator + '/'; document.querySelector('#display').value = calcuator;">/</button>
       <button  class="button" onclick="calcuator = calcuator + '7'; document.querySelector('#display').value = calcuator;">7</button>
       <button  class="button" onclick="calcuator = calcuator + '8'; document.querySelector('#display').value = calcuator;">8</button>
       <button  class="button" onclick="calcuator = calcuator + '9'; document.querySelector('#display').value = calcuator;">9</button>
       <button  class="button" onclick="calcuator = calcuator + '*'; document.querySelector('#display').value = calcuator;">*</button>
       <button  class="button" onclick="calcuator = calcuator + '4'; document.querySelector('#display').value = calcuator;">4</button>
       <button  class="button" onclick="calcuator = calcuator + '5'; document.querySelector('#display').value = calcuator;">5</button>
       <button  class="button" onclick="calcuator = calcuator + '6'; document.querySelector('#display').value = calcuator;">6</button>
       <button  class="button" onclick="calcuator = calcuator + '-'; document.querySelector('#display').value = calcuator;">-</button>
       <button  class="button" onclick="calcuator = calcuator + '1'; document.querySelector('#display').value = calcuator;">1</button>
       <button  class="button" onclick="calcuator = calcuator + '2'; document.querySelector('#display').value = calcuator;">2</button>
       <button  class="button" onclick="calcuator = calcuator + '3'; document.querySelector('#display').value = calcuator;">3</button>
       <button  class="button" onclick="calcuator = calcuator + '+'; document.querySelector('#display').value = calcuator;">+</button>
       <button  class="button" onclick="calcuator = calcuator + '0'; document.querySelector('#display').value = calcuator;">0</button>
       <button  class="button" onclick="calcuator = calcuator + '.'; document.querySelector('#display').value = calcuator;">.</button>
       <button  class="button" onclick="calcuator = calcuator + '00'; document.querySelector('#display').value = calcuator;">00</button>
       <button  class="button" onclick=" let result = eval(calcuator); calcuator = result ; document.querySelector('#display').value = calcuator;">=</button>
       
    </div>   
 </div>
    <script>
        let calcuator = '';
        document.querySelector('#display').value = calcuator;
       
    </script>
    
</body>
</html>
